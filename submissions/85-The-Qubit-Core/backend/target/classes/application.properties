# --- Server ---------------------------------------------------------------
server.port=8080
server.servlet.context-path=/

# --- Application ----------------------------------------------------------
spring.application.name=nirukt-ocr-engine

# --- File Upload Limits ---------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# --- Request Timeouts (large scanned PDFs can take several minutes) -------
server.tomcat.connection-timeout=600000
spring.mvc.async.request-timeout=600000

# --- OCR Configuration ----------------------------------------------------
# ABSOLUTE path to tessdata folder - Tess4J on Windows requires this
ocr.tessdata.path=C:/Users/suman/Desktop/OCR/backend/tessdata
ocr.language=eng
ocr.upload.max-size-mb=50

# --- Actuator -------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# --- Logging - set tess4j to INFO so we can see path issues ---------------
logging.level.com.ocrengine=INFO
logging.level.net.sourceforge.tess4j=INFO
logging.level.org.apache.pdfbox=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
